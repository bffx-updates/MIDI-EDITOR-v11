<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#121214" />
  <title>BFMIDI Editor</title>
  <link rel="manifest" href="./manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-body: #121214;
      --bg-sidebar: #1c1c1f;
      --bg-card: #232326;
      --bg-card-inner: #1a1a1d;
      --accent: #FFB300;
      --accent-hover: #ffc400;
      --accent-glow: rgba(255, 179, 0, 0.4);
      --text-primary: #f2f2f2;
      --text-secondary: #a1a1aa;
      --border-subtle: #333336;
      --ok: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-sidebar); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* --- LAYOUT --- */
    .editor-shell {
      width: 100%; height: 100%;
      display: flex;
      overflow: hidden;
    }

    /* --- SIDEBAR --- */
    aside {
      width: 280px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 20;
      box-shadow: 4px 0 15px rgba(0,0,0,0.3);
    }

    .sidebar-brand {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .brand-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 800; font-size: 0.75rem;
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
      flex-shrink: 0;
      margin-right: 12px;
    }

    .brand-text h1 {
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: 0.05em; color: #fff; line-height: 1.2;
    }
    .brand-text h1 span { color: var(--accent); }
    .brand-text .brand-sub {
      font-size: 9px; color: #71717a;
      text-transform: uppercase; letter-spacing: 0.2em; font-weight: 500;
    }

    /* --- NAV --- */
    nav { padding: 16px 12px 0 12px; flex-shrink: 0; }
    nav .nav-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      color: #a1a1aa;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      border: 1px solid transparent;
    }
    .nav-item:hover {
      color: #e4e4e7;
      background-color: rgba(255,255,255,0.04);
    }
    .nav-item.active {
      background-color: rgba(255, 179, 0, 0.08);
      border-color: rgba(255, 179, 0, 0.2);
      color: var(--accent);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.05);
    }
    .nav-item .material-symbols-outlined { font-size: 20px; }

    /* --- SEPARATOR --- */
    .sidebar-sep {
      margin: 12px 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
      flex-shrink: 0;
    }

    /* --- USB CONTROL --- */
    .usb-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 12px 12px 12px;
      min-height: 0;
    }

    .usb-panel {
      background-color: #151518;
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.6);
    }

    .usb-header {
      background-color: var(--bg-card);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .usb-header-left {
      display: flex; align-items: center; gap: 6px;
    }
    .usb-header-left .material-symbols-outlined {
      color: var(--accent); font-size: 14px;
    }
    .usb-header-left span:last-child {
      font-size: 10px; font-weight: 700;
      color: #d4d4d8; text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Status indicator */
    .usb-status {
      display: flex; align-items: center; gap: 5px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .usb-status[data-state="connected"] {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .usb-status[data-state="connecting"] {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
    }
    .usb-status[data-state="error"] {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
    }
    .usb-status[data-state="disconnected"] {
      background: rgba(113,113,122,0.1);
      border: 1px solid rgba(113,113,122,0.2);
    }

    .usb-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #71717a;
      transition: all 0.3s;
    }
    .usb-status[data-state="connected"] .usb-status-dot {
      background: var(--ok);
      box-shadow: 0 0 6px rgba(34,197,94,0.8);
      animation: pulse-dot 2s infinite;
    }
    .usb-status[data-state="connecting"] .usb-status-dot {
      background: var(--warn);
      box-shadow: 0 0 6px rgba(245,158,11,0.8);
      animation: pulse-dot 1s infinite;
    }
    .usb-status[data-state="error"] .usb-status-dot {
      background: var(--error);
      box-shadow: 0 0 6px rgba(239,68,68,0.8);
    }

    .usb-status-text {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .usb-status[data-state="connected"] .usb-status-text { color: var(--ok); }
    .usb-status[data-state="connecting"] .usb-status-text { color: var(--warn); }
    .usb-status[data-state="error"] .usb-status-text { color: var(--error); }
    .usb-status[data-state="disconnected"] .usb-status-text { color: #71717a; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Buttons */
    .usb-buttons {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .btn-connect {
      height: 34px;
      background: linear-gradient(180deg, rgba(255, 179, 0, 0.9), rgba(229, 161, 0, 0.9));
      border: 1px solid rgba(255, 179, 0, 0.5);
      color: #121214;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-connect:hover:not(:disabled) {
      background: linear-gradient(180deg, #ffc133, #ffb300);
      box-shadow: 0 0 15px rgba(255,179,0,0.3);
    }
    .btn-connect:active:not(:disabled) { transform: scale(0.96); }
    .btn-connect:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-disconnect {
      height: 34px;
      background-color: #2c2c30;
      border: 1px solid #444;
      color: #a1a1aa;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-disconnect:hover:not(:disabled) {
      background-color: #333; color: #fff;
    }
    .btn-disconnect:active:not(:disabled) { transform: scale(0.96); }
    .btn-disconnect:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Logs */
    .usb-logs-area {
      flex: 1;
      min-height: 0;
      background-color: #0f0f11;
      position: relative;
    }
    .usb-logs-area::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0, 80, 0, 0.03);
      pointer-events: none;
    }
    .usb-logs-label {
      position: absolute; top: 6px; right: 8px; z-index: 2;
      font-size: 9px; font-family: monospace;
      color: rgba(34, 197, 94, 0.4);
      text-transform: uppercase;
    }

    .usb-logs {
      height: 100%;
      overflow-y: auto;
      padding: 8px 10px;
      font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
      font-size: 10px;
      line-height: 1.6;
      color: rgba(34, 197, 94, 0.75);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .usb-logs::-webkit-scrollbar { width: 4px; }
    .usb-logs::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    .usb-logs::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.3); border-radius: 2px; }

    /* --- DEVICE FOOTER --- */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .device-info {
      display: flex; align-items: center; gap: 10px;
    }
    .device-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #71717a;
      transition: all 0.3s;
    }
    .device-dot.connected { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .device-label {
      font-size: 10px; font-weight: 700;
      color: #71717a; text-transform: uppercase;
    }
    .device-name {
      font-size: 12px; font-weight: 600;
      color: #fff; font-family: monospace;
    }

    /* --- MAIN CONTENT --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background-color: var(--bg-body);
      overflow: hidden;
    }

    iframe {
      width: 100%; height: 100%;
      border: none;
      background: var(--bg-body);
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 860px) {
      aside { width: 64px; }
      .brand-text, .usb-header-left span:last-child,
      .usb-status-text, .usb-logs-label,
      .device-label, .device-name { display: none; }
      .nav-item span:not(.material-symbols-outlined) { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .sidebar-brand { justify-content: center; padding: 0; }
      .brand-icon { margin-right: 0; }
      .usb-buttons { grid-template-columns: 1fr; }
      .btn-connect, .btn-disconnect { font-size: 0; }
      .btn-connect::after { content: 'USB'; font-size: 9px; }
      .btn-disconnect::after { content: 'OFF'; font-size: 9px; }
    }
  </style>
  <link rel="stylesheet" href="./css/visual-refresh-shell.css" />
</head>
<body>
  <section class="editor-shell">
    <!-- SIDEBAR -->
    <aside>
      <!-- Brand -->
      <div class="sidebar-brand">
        <div class="brand-icon">BF</div>
        <div class="brand-text">
          <h1 id="brandTitle">BFMIDI</h1>
          <div class="brand-sub">Control Suite</div>
        </div>
      </div>

      <!-- Navigation -->
      <nav>
        <ul class="nav-list">
          <li>
            <a class="nav-item active" data-page="preset-config" id="navPreset">
              <span class="material-symbols-outlined">tune</span>
              <span>PRESET CONFIG</span>
            </a>
          </li>
          <li>
            <a class="nav-item" data-page="global-config" id="navGlobal">
              <span class="material-symbols-outlined">settings_input_component</span>
              <span>GLOBAL CONFIG</span>
            </a>
          </li>
          <li>
            <a class="nav-item" data-page="system" id="navSystem">
              <span class="material-symbols-outlined">settings</span>
              <span>SYSTEM</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Separator -->
      <div class="sidebar-sep"></div>

      <!-- USB Control -->
      <div class="usb-section">
        <div class="usb-panel">
          <!-- USB Header -->
          <div class="usb-header">
            <div class="usb-header-left">
              <span class="material-symbols-outlined">usb</span>
              <span>USB Control</span>
            </div>
            <div class="usb-status" id="usbStatusIndicator" data-state="disconnected">
              <span class="usb-status-dot"></span>
              <span class="usb-status-text" id="usbStatusText">OFFLINE</span>
            </div>
          </div>

          <!-- Connect/Disconnect Buttons -->
          <div class="usb-buttons">
            <button class="btn-connect" id="btnToolbarConnect" type="button">Connect</button>
            <button class="btn-disconnect" id="btnToolbarDisconnect" type="button" disabled>Disconnect</button>
          </div>

          <!-- Logs -->
          <div class="usb-logs-area">
            <span class="usb-logs-label">LOGS</span>
            <div class="usb-logs" id="serialLogs">[monitor] Clique em Connect para iniciar o link USB.</div>
          </div>
        </div>
      </div>

      <!-- Device Footer -->
      <div class="sidebar-footer">
        <div class="device-info">
          <div class="device-dot" id="deviceDot"></div>
          <div>
            <div class="device-label">Device</div>
            <div class="device-name" id="deviceName">---</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <iframe id="editorFrame" src="./preset-config/" title="BFMIDI Editor"></iframe>
    </div>
  </section>

  <script type="module" src="./js/launcher.js"></script>
</body>
</html>
